version: "2"

run:
  timeout: 5m
  tests: true
  skip-dirs-use-default: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
  new: false
  rules:
    - linters:
        - govet
      text: "shadows declaration"
      severity: error

#  exclude-rules:
#    - linters: [revive]
#      text: "ALL_CAPS"

linters:
  disable-all: true
  enable:
    # --- correctness & bugs ---
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - nilerr
    - nilnil
    - bodyclose
    - rowserrcheck

    # --- security / footguns ---
    - gosec
    - sqlclosecheck

    # --- error handling & logic ---
    - errorlint
    - wrapcheck
    - exhaustive
    - copyloopvar

    # --- concurrency ---
    - gocritic
    - prealloc

    # --- style (light, not pedantic) ---
    - revive
    - misspell
    - unconvert
    # - whitespace #no more: unnecessary trailing newline (whitespace)

    # --- unused / dead code ---
    - unused
  settings:
    #gocritic:
    #  disabled-checks:
    #    - commentFormatting #found where to place it correctly by Gemini 3 Fast! (yes, really) ie. must be in linters: settings: not linters-settings:

#linters-settings:

    govet:
      enable:
        - shadow # Explicitly enable the shadowing check
        - copylocks # if you use atomic var without .Load() in a printf, it should be an err not warn
      settings:
        shadow:
          strict: false # This makes it even more aggressive, if 'true'
      enable-all: true
      disable:
        - fieldalignment  # good to know, rarely worth the churn

    staticcheck:
      checks:
        - "all"
        - "-ST1003" #ST1003: should not use ALL_CAPS in Go names; use CamelCase instead (staticcheck)go-golangci-lint-v2
        - "-QF1011" #QF1011: could omit type bool from declaration; it will be inferred from the right-hand side (staticcheck)go-golangci-lint-v2

    errcheck:
      check-type-assertions: true
      check-blank: true

    errorlint:
      asserts: true
      comparison: true

    wrapcheck:
      ignoreSigs:
        - .Errorf(
        - errors.New(
        - fmt.Errorf(
      ignorePackageGlobs:
        - net/http
        - database/sql

    revive:
      #enable-all-rules: false
      severity: warning
      rules:
        - name: var-naming
          disabled: true
        - name: early-return
          disabled: true
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true #no more  exported: exported type FailoverSelector should have comment or be unexported (revive)
        - name: unexported-return
        - name: unused-parameter
        - name: empty-lines
        - name: var-declaration
          disabled: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - emptyStringTest
        - unnamedResult       # you *intentionally* use named returns
        - ifElseChain
        - octalLiteral
        - hugeParam
        - commentFormatting #commentFormatting: put a space between `//` and comment text (gocritic)go-golangci-lint-v2
        - commentedOutCode #no more  commentedOutCode: may want to remove commented-out code (gocritic) 

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104  # ignoring errors from deferred Close is often fine

    exhaustive:
      check-generated: false

